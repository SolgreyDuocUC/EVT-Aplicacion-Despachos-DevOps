name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-backend-ventas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build ms-ventas
        run: cd backend/ms-ventas && mvn clean verify -DskipTests

  build-backend-despachos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Build ms-despacho
        run: cd backend/ms-despacho && mvn clean verify -DskipTests

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies and build
        run: |
          cd frontend
          npm ci
          npm run build

  build-docker-compose:
    runs-on: ubuntu-latest
    needs: [build-backend-ventas, build-backend-despachos, build-frontend]
    steps:
      - uses: actions/checkout@v3
      - name: Test Docker Compose Build
        run: docker compose build
