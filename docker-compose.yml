services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DESPACHO_DB_NAME: ${DESPACHO_DB_NAME}
      DESPACHO_DB_USER: ${DESPACHO_DB_USER}
      DESPACHO_DB_PASSWORD: ${DESPACHO_DB_PASSWORD}
      VENTAS_DB_NAME: ${VENTAS_DB_NAME}
      VENTAS_DB_USER: ${VENTAS_DB_USER}
      VENTAS_DB_PASSWORD: ${VENTAS_DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - despachos-net
    deploy:
      restart_policy:
        condition: on-failure

  ms-despacho:
    build:
      context: ./backend/ms-despacho
    restart: unless-stopped
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${DESPACHO_DB_NAME}
      DB_USERNAME: ${DESPACHO_DB_USER}
      DB_PASSWORD: ${DESPACHO_DB_PASSWORD}
    ports:
      - "${MS_DESPACHO_PORT:-8081}:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - despachos-net
    deploy:
      restart_policy:
        condition: on-failure

  ms-ventas:
    build:
      context: ./backend/ms-ventas
    restart: unless-stopped
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${VENTAS_DB_NAME}
      DB_USERNAME: ${VENTAS_DB_USER}
      DB_PASSWORD: ${VENTAS_DB_PASSWORD}
    ports:
      - "${MS_VENTAS_PORT:-8082}:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - despachos-net
    deploy:
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8090}:80"
    depends_on:
      - ms-despacho
      - ms-ventas
    networks:
      - despachos-net
    deploy:
      restart_policy:
        condition: on-failure

networks:
  despachos-net:
    driver: bridge

volumes:
  mysql-data:
